services:
    orders-service:
        build: ./OrdersService
        container_name: orders
        environment:
            - SERVER_PORT=8081
            - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/orbita_market_db
            - SPRING_DATASOURCE_USERNAME${POSTGRES_USERNAME}
            - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
            - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
        ports:
            - "8081:8081"
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
    
    payments-service:
        build: ./PaymentsService
        container_name: payments
        environment:
            - SERVER_PORT=8082
            - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/orbita_market_db
            - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
            - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
            - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
            - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9093
        ports:
            - "8082:8082"
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
    
    db:
        image: postgres:16-alpine
        container_name: postgres-db
        environment:
            - POSTGRES_DB=orbita_market_db
            - POSTGRES_USER=${POSTGRES_USERNAME}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d orbita_market_db"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
            
    kafka:
        image: apache/kafka:latest
        container_name: kafka
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094,EXTERNAL://0.0.0.0:29093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,EXTERNAL://localhost:29093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        ports:
            - "9093:9093"
            - "29093:29093"
        volumes:
            - kafka_data:/var/lib/kafka/data
            
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka-ui
        ports:
            - "8085:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
        depends_on:
            - kafka
            
volumes:
    pgdata:
    kafka_data: